<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 聊天</title>
    <style>
        /* ==================== 全局重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==================== 顶部栏 ==================== */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a4a;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header .status-text {
            font-size: 13px;
            color: #888;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-right label {
            font-size: 13px;
            color: #888;
        }

        .header-right input {
            background: #1e1e3a;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 6px 12px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
        }

        .header-right input:focus {
            border-color: #3a7bd5;
        }

        /* ==================== 聊天主体 ==================== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #3a3a5a;
            border-radius: 3px;
        }

        /* ==================== 消息气泡 ==================== */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e3a;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }

        .message .msg-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .message .msg-time {
            font-size: 11px;
            opacity: 0.4;
            margin-top: 4px;
            text-align: right;
        }

        .message.assistant .msg-label {
            color: #00d2ff;
        }
        .message.user .msg-label {
            color: rgba(255,255,255,0.8);
        }

        /* ---------- 消息中的图片 ---------- */
        .message .msg-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            object-fit: contain;
            background: #1a1a2e;
        }

        /* ==================== 正在输入指示器 ==================== */
        .typing-indicator {
            align-self: flex-start;
            background: #1e1e3a;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 20px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3a7bd5;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .typing-indicator.show {
            display: flex;
        }

        /* ==================== 输入区 ==================== */

        /* ========== 语音合成开关 ========== */
        .tts-toggle-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            padding: 4px 0;
            border-bottom: 1px solid #2a2a4a;
            margin-bottom: 8px;
        }

        .tts-toggle-row span {
            font-size: 13px;
            color: #888;
            user-select: none;
        }

        /* 修正：使用 .tts-switch 类，与 CSS 一致 */
        .tts-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .tts-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .tts-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #3a3a5a;
            transition: .3s;
            border-radius: 26px;
        }

        .tts-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: #e0e0e0;
            transition: .3s;
            border-radius: 50%;
        }

        .tts-switch input:checked + .tts-slider {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
        }

        .tts-switch input:checked + .tts-slider:before {
            transform: translateX(22px);
        }

        .input-area {
            flex-shrink: 0;
            padding: 16px 24px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-area input[type="text"] {
            flex: 1;
            background: #1e1e3a;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .input-area input[type="text"]:focus {
            border-color: #3a7bd5;
        }

        .input-area input[type="text"]::placeholder {
            color: #666;
        }

        .input-area button {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .input-area button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(58, 123, 213, 0.4);
        }

        .input-area button:active {
            transform: translateY(0);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .input-area .btn-image {
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            padding: 12px 16px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            color: #e0e0e0;
        }

        .input-area .btn-image:hover {
            background: #3a3a5a;
        }

        /* ---------- 图片预览 ---------- */
        .image-preview {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #1e1e3a;
            border-radius: 10px;
            border: 1px solid #3a3a5a;
        }

        .image-preview.show {
            display: flex;
        }

        .image-preview img {
            max-height: 60px;
            max-width: 60px;
            border-radius: 6px;
            object-fit: cover;
        }

        .image-preview .file-name {
            font-size: 13px;
            color: #aaa;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .image-preview .btn-remove {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .image-preview .btn-remove:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* ==================== 错误/系统消息 ==================== */
        .message.error {
            align-self: center;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            border-radius: 8px;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
        }

        .message.system {
            align-self: center;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border-radius: 8px;
            font-size: 12px;
            max-width: 90%;
            text-align: center;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 640px) {
            .message {
                max-width: 85%;
            }
            .header {
                flex-direction: column;
                gap: 8px;
                align-items: stretch;
            }
            .header-right {
                flex-wrap: wrap;
            }
            .header-right input {
                flex: 1;
            }
            .input-area {
                padding: 12px 16px;
            }
            .input-row {
                flex-wrap: wrap;
            }
            .input-area button {
                flex: 1;
                padding: 12px 16px;
            }
            .input-area .btn-image {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部栏 ==================== -->
    <div class="header">
        <div class="header-left">
            <span class="logo">🤖 AI Agent</span>
            <span class="status-dot"></span>
            <span class="status-text" id="statusText">已连接</span>
        </div>
        <div class="header-right">
            <label for="userId">用户ID</label>
            <input type="text" id="userId" value="web_user" placeholder="输入用户ID" onchange="switchUser()">
            <button onclick="switchUser()" style="background:transparent;border:1px solid #3a7bd5;border-radius:8px;padding:6px 12px;color:#3a7bd5;cursor:pointer;font-size:13px;">切换用户</button>
            <button onclick="clearChat()" style="background:transparent;border:1px solid #3a3a5a;border-radius:8px;padding:6px 12px;color:#888;cursor:pointer;font-size:13px;">清空</button>
        </div>
    </div>

    <!-- ==================== 聊天区域 ==================== -->
    <div class="chat-container" id="chatContainer"></div>

    <!-- ==================== 正在输入指示器 ==================== -->
    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <!-- ==================== 输入区 ==================== -->
    <div class="input-area">
        <!-- 语音合成开关 -->
        <div class="tts-toggle-row">
            <span>🔊 语音合成</span>
            <label class="tts-switch">
                <input type="checkbox" id="ttsToggle" checked>
                <span class="tts-slider"></span>
            </label>
        </div>

        <!-- 图片预览 -->
        <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="" alt="预览">
            <span class="file-name" id="previewFileName">image.jpg</span>
            <button class="btn-remove" onclick="removeImage()">✕</button>
        </div>

        <!-- 输入行 -->
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="输入消息，按 Enter 发送..." autofocus>
            <button class="btn-image" id="imageBtn" title="上传图片">🖼️</button>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>

        <!-- 隐藏的文件输入 -->
        <input type="file" id="imageInput" accept="image/*" style="display:none">
    </div>

    <script>
        // ==================== 全局状态 ====================
        let selectedImageBase64 = null;   // 完整 Base64（含前缀）
        let selectedImageName = '';
        let ttsEnabled = true;   // 语音合成开关状态

        // ==================== WebSocket 连接 ====================
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/chat`;
        let ws = null;
        let reconnectTimer = null;
        let messageQueue = [];

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusText = document.getElementById('statusText');
        const imageInput = document.getElementById('imageInput');
        const imageBtn = document.getElementById('imageBtn');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const previewFileName = document.getElementById('previewFileName');

        // ==================== 安全获取 DOM 元素，防止 null ====================
        function safeGet(id) {
            const el = document.getElementById(id);
            if (!el) console.warn(`Element with id "${id}" not found`);
            return el;
        }
        const ttsToggle = safeGet('ttsToggle');

        // ==================== WebSocket 连接 ====================
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;

            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('[WS] 已连接');
                statusText.textContent = '已连接';
                statusText.style.color = '#4ade80';
                sendBtn.disabled = false;

                while (messageQueue.length > 0) {
                    const msg = messageQueue.shift();
                    ws.send(JSON.stringify(msg));
                }
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleServerMessage(data);
                } catch (e) {
                    console.error('[WS] 解析消息失败:', e);
                }
            };

            ws.onerror = function(err) {
                console.error('[WS] 错误:', err);
                statusText.textContent = '连接错误';
                statusText.style.color = '#f87171';
            };

            ws.onclose = function() {
                console.log('[WS] 连接关闭');
                statusText.textContent = '已断开，重连中...';
                statusText.style.color = '#fbbf24';
                sendBtn.disabled = true;

                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    console.log('[WS] 尝试重连...');
                    connectWebSocket();
                }, 3000);
            };
        }

        // ==================== 切换用户 ====================
        function switchUser() {
            const userId = document.getElementById('userId').value.trim() || 'web_user';
            chatContainer.innerHTML = '';
            addMessage('system', `👤 已切换到用户: ${userId}`);
            addMessage('assistant', `呐呐！切换到 ${userId} 啦！我是户山香澄，让我们一起闪闪发光吧！有什么想聊的尽管说`);
            if (ws) {
                ws.close();
            }
            connectWebSocket();
        }

        // ==================== 处理服务端消息 ====================
        function handleServerMessage(data) {
            typingIndicator.classList.remove('show');

            if (data.type === 'message') {
                // 显示文字消息
                addMessage('assistant', data.content);

                // 如果有音频，自动播放
                if (ttsEnabled && data.audio) {
                    const audio = new Audio("data:audio/wav;base64," + data.audio);
                    audio.play().catch(e => console.log('[音频] 播放失败:', e));
                }
            } else if (data.type === 'error') {
                addMessage('error', '⚠️ ' + data.content);
            } else if (data.type === 'system') {
                addMessage('system', data.content);
            } else if (data.type === 'debug') {
                console.log('[调试]', data.content);
            }
        }

        // ==================== 添加消息气泡 ====================
        function addMessage(role, content, imageBase64) {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            let label = '';
            if (role === 'user') label = '你';
            else if (role === 'assistant') label = '🤖 AI';
            else if (role === 'error') label = '⚠️';
            else if (role === 'system') label = 'ℹ️';

            let imageHtml = '';
            if (imageBase64) {
                imageHtml = `<img class="msg-image" src="${imageBase64}" alt="图片">`;
            }

            div.innerHTML = `
                <div class="msg-label">${label}</div>
                <div>${escapeHtml(content)}</div>
                ${imageHtml}
                <div class="msg-time">${timeStr}</div>
            `;

            chatContainer.appendChild(div);
            scrollToBottom();
        }

        // ==================== 发送消息 ====================
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !selectedImageBase64) return;

            const user_id = document.getElementById('userId').value.trim() || 'web_user';

            // 显示用户消息（含图片）
            addMessage('user', text || '📷 发送了一张图片', selectedImageBase64);

            // 构建 payload
            const payload = {
                user_id: user_id,
                message: text || '这张图片里有什么？',
                tts: ttsEnabled   // 把开关状态传给后端
            };
            if (selectedImageBase64) {
                payload.image = selectedImageBase64;
            }

            // 清空输入
            messageInput.value = '';
            removeImage();
            messageInput.focus();

            typingIndicator.classList.add('show');

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(payload));
            } else {
                addMessage('error', '⚠️ 未连接到服务器，消息已加入队列...');
                messageQueue.push(payload);
                connectWebSocket();
            }
        }

        // ==================== 图片选择处理 ====================
        function handleImageSelect(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                selectedImageName = file.name;
                updateImagePreview(selectedImageBase64, selectedImageName);
            };
            reader.readAsDataURL(file);
        }

        function updateImagePreview(base64, name) {
            previewImg.src = base64;
            previewFileName.textContent = name;
            imagePreview.classList.add('show');
        }

        function removeImage() {
            selectedImageBase64 = null;
            selectedImageName = '';
            imagePreview.classList.remove('show');
            previewImg.src = '';
            imageInput.value = '';
        }

        // ==================== 清空聊天 ====================
        function clearChat() {
            if (confirm('确定清空聊天记录？只是清空显示，不影响记忆。')) {
                chatContainer.innerHTML = '';
                addMessage('system', '聊天显示已清空');
            }
        }

        // ==================== 工具函数 ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 50);
        }

        // ==================== 事件绑定 ====================
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        imageBtn.addEventListener('click', function() {
            imageInput.click();
        });

        imageInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files.length > 0) {
                handleImageSelect(e.target.files[0]);
            }
        });

        // 恢复 TTS 开关状态
        try {
            const savedTts = localStorage.getItem('ttsEnabled');
            if (savedTts !== null) {
                ttsEnabled = savedTts === 'true';
            }
            if (ttsToggle) ttsToggle.checked = ttsEnabled;
        } catch (e) {
            console.warn('localStorage 访问失败，使用默认开启状态');
            ttsEnabled = true;
        }

        // 监听开关变化
        if (ttsToggle) {
            ttsToggle.addEventListener('change', function() {
                ttsEnabled = this.checked;
                try {
                    localStorage.setItem('ttsEnabled', String(ttsEnabled));
                } catch (e) {}
                console.log('[TTS] 开关状态:', ttsEnabled ? '启用' : '禁用');
            });
        }

        // ==================== 启动 ====================
        connectWebSocket();
        addMessage('system', '⭐ 香澄上线啦！让我们一起寻找闪闪发光的东西吧！支持图片上传哦～');
        addMessage('assistant', '呐呐！你来啦～香澄等你好久了！今天想聊点什么呢？キラキラ☆ドキドキ！');
    </script>
</body>
</html>
